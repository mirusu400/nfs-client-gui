name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  GOPRIVATE: github.com/mirusu400/*

jobs:
  # Security check: no proxy leaks
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for direct net.Dial (proxy leak)
        run: |
          if grep -rn 'net\.Dial[^e]' --include='*.go' internal/ | grep -v '_test.go' | grep -v '//'; then
            echo "ERROR: direct net.Dial found in production code (proxy leak)"
            exit 1
          fi
          echo "OK: no proxy leaks"
      - name: Check go-nfs-client not imported in production
        run: |
          if grep -r 'go-nfs-client' --include='*.go' internal/; then
            echo "ERROR: go-nfs-client imported in production code"
            exit 1
          fi
          echo "OK: go-nfs-client not in production"

  build:
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            artifact: nfsprobe-darwin-arm64
          - os: macos-13
            platform: darwin/amd64
            artifact: nfsprobe-darwin-amd64
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: nfsprobe-linux-amd64
          - os: windows-latest
            platform: windows/amd64
            artifact: nfsprobe-windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev || sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Run tests
        if: matrix.platform == 'linux/amd64'
        run: go test ./internal/...

      - name: Build
        run: wails build -platform ${{ matrix.platform }}

      # Package output
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          tar czf ${{ matrix.artifact }}.tar.gz nfsprobe.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          chmod +x nfsprobe
          tar czf ${{ matrix.artifact }}.tar.gz nfsprobe

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build\bin\nfsprobe.exe -DestinationPath build\bin\${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/bin/${{ matrix.artifact }}.tar.gz
            build/bin/${{ matrix.artifact }}.zip

  # Linux ARM64 on native runner
  build-linux-arm64:
    needs: audit
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev || sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Build
        run: wails build

      - name: Package
        run: |
          cd build/bin
          chmod +x nfsprobe
          tar czf nfsprobe-linux-arm64.tar.gz nfsprobe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfsprobe-linux-arm64
          path: build/bin/nfsprobe-linux-arm64.tar.gz

  # Create release when a tag is pushed
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
